<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    @font-face { font-family: 'PingFang SC'; src: local('PingFang SC'), local('PingFangSC-Regular'); }
    @font-face { font-family: 'Hiragino Sans GB'; src: local('Hiragino Sans GB'), local('HiraginoSansGB-W3'); }
    @font-face { font-family: 'Microsoft YaHei'; src: local('Microsoft YaHei'), local('MicrosoftYaHei'); }
    /* 全局样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html,
    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #08080c;
    }
    body {
      font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }
    #root {
      position: relative;
      width: 1920px;
      height: 1080px;
    }
    /* 过渡层：径向辉光遮罩，用于辉光 / crossfade 过渡 */
    .transition-glow {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      background: radial-gradient(circle at center, rgba(238, 85, 119, .9) 0%, rgba(238, 85, 119, 0) 70%);
      opacity: 0;
      z-index: 100;
      pointer-events: none;
    }
    /* 过渡层：实色擦除带，用于 wipe 过渡 */
    .transition-wipe {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      background: #08080c;
      clip-path: inset(0 100% 0 0);
      z-index: 101;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root" data-composition-id="root" data-start="0" data-duration="60" data-width="1920" data-height="1080">
    <!-- 6 个子合成场景（track-index=1，无重叠） -->
    <div id="scene-1" class="clip" data-composition-id="scene-1" data-composition-src="compositions/scene-1-opening.html" data-start="0" data-duration="9" data-track-index="1"></div>
    <div id="scene-2" class="clip" data-composition-id="scene-2" data-composition-src="compositions/scene-2-characters.html" data-start="9" data-duration="10" data-track-index="1"></div>
    <div id="scene-3" class="clip" data-composition-id="scene-3" data-composition-src="compositions/scene-3-streaming.html" data-start="19" data-duration="10" data-track-index="1"></div>
    <div id="scene-4" class="clip" data-composition-id="scene-4" data-composition-src="compositions/scene-4-vision.html" data-start="29" data-duration="10" data-track-index="1"></div>
    <div id="scene-5" class="clip" data-composition-id="scene-5" data-composition-src="compositions/scene-5-sync.html" data-start="39" data-duration="10" data-track-index="1"></div>
    <div id="scene-6" class="clip" data-composition-id="scene-6" data-composition-src="compositions/scene-6-outro.html" data-start="49" data-duration="11" data-track-index="1"></div>

    <!-- 过渡层（track-index=0） -->
    <div class="clip transition-glow" data-start="0" data-duration="60" data-track-index="0"></div>
    <div class="clip transition-wipe" data-start="0" data-duration="60" data-track-index="2"></div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // ===== 5 个场景过渡动画 =====
    // 每个过渡在交界点前 0.3s 开始，交界点达到峰值，交界点后 0.3s 结束。
    // 每个过渡前用 tl.set() 重置过渡层状态，避免属性残留。

    // 1→2（9s）辉光扩散：中心点 50% 50%
    tl.set(".transition-glow", { scale: 0, opacity: 0, transformOrigin: "50% 50%" }, 8.65);
    tl.to(".transition-glow", { opacity: 1, scale: 3, duration: 0.3, ease: "power2.in", transformOrigin: "50% 50%" }, 8.7);
    tl.to(".transition-glow", { opacity: 0, scale: 1, duration: 0.3, ease: "power2.out" }, 9.0);

    // 2→3（19s）wipe 擦除：左→右展开，右→左收回
    tl.set(".transition-wipe", { clipPath: "inset(0 100% 0 0)" }, 18.7);
    tl.to(".transition-wipe", { clipPath: "inset(0 0% 0 0)", duration: 0.5, ease: "power2.inOut" }, 18.7);
    tl.to(".transition-wipe", { clipPath: "inset(0 0% 0 100%)", duration: 0.5, ease: "power2.inOut" }, 19.0);

    // 3→4（29s）径向辉光：从不同中心点 30% 50% 扩散
    tl.set(".transition-glow", { scale: 0, opacity: 0, transformOrigin: "30% 50%" }, 28.65);
    tl.to(".transition-glow", { opacity: 1, scale: 3, duration: 0.3, ease: "power2.in", transformOrigin: "30% 50%" }, 28.7);
    tl.to(".transition-glow", { opacity: 0, scale: 1, duration: 0.3, ease: "power2.out" }, 29.0);

    // 4→5（39s）crossfade + 微缩：辉光半透明覆盖后淡出
    tl.set(".transition-glow", { scale: 1, opacity: 0, transformOrigin: "50% 50%" }, 38.65);
    tl.to(".transition-glow", { opacity: 0.85, duration: 0.4, ease: "power2.in" }, 38.7);
    tl.to(".transition-glow", { opacity: 0, duration: 0.4, ease: "power2.out" }, 39.0);

    // 5→6（49s）辉光脉冲：从中心快速放大 4 倍后淡出
    tl.set(".transition-glow", { scale: 0, opacity: 0, transformOrigin: "50% 50%" }, 48.7);
    tl.to(".transition-glow", { opacity: 1, scale: 4, duration: 0.5, ease: "expo.out" }, 48.7);
    tl.to(".transition-glow", { opacity: 0, duration: 0.4, ease: "power2.out" }, 49.1);

    window.__timelines["root"] = tl;
  </script>
</body>
</html>
