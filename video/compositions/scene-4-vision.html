<template id="scene-4-template">
  <div data-composition-id="scene-4" data-width="1920" data-height="1080">
    <style>
      @font-face { font-family: 'PingFang SC'; src: local('PingFang SC'), local('PingFangSC-Regular'); }
      @font-face { font-family: 'Hiragino Sans GB'; src: local('Hiragino Sans GB'), local('HiraginoSansGB-W3'); }
      @font-face { font-family: 'Microsoft YaHei'; src: local('Microsoft YaHei'), local('MicrosoftYaHei'); }
      /* ===== 场景 4：多模态识图 — 局部样式 ===== */
      [data-composition-id="scene-4"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #08080c;
        font-family: "Inter", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
        overflow: hidden;
      }

      /* vision 辉光层：装饰性绝对定位，铺满整场景 */
      [data-composition-id="scene-4"] .vision-glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% 50%, rgba(238, 85, 119, .3) 0%, rgba(238, 85, 119, 0) 60%);
        opacity: 0;
        z-index: 5;
      }

      /* 内容容器：flex + padding 布局（非绝对定位） */
      [data-composition-id="scene-4"] .scene-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: stretch;
        width: 100%;
        height: 100%;
        padding: 64px 120px;
        gap: 40px;
        box-sizing: border-box;
        position: relative;
        z-index: 10;
      }

      /* 章节眉头：顶部居中 */
      [data-composition-id="scene-4"] .scene-header {
        text-align: center;
      }
      [data-composition-id="scene-4"] .eyebrow {
        font-size: 14px;
        letter-spacing: .22em;
        text-transform: uppercase;
        color: #EE5577;
        margin-bottom: 14px;
        font-weight: 500;
      }
      [data-composition-id="scene-4"] .section-title {
        font-size: 56px;
        font-weight: 600;
        color: #f6f4f8;
        line-height: 1.15;
        font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      }

      /* 两栏布局：左图片选择器 / 右识别结果卡片 */
      [data-composition-id="scene-4"] .vision-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 64px;
        max-width: 1400px;
        margin: 0 auto;
        align-items: center;
        width: 100%;
      }

      /* 左栏：图片选择器 3×3 网格 */
      [data-composition-id="scene-4"] .picker {
        width: 100%;
      }
      [data-composition-id="scene-4"] .picker-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      [data-composition-id="scene-4"] .picker-item {
        aspect-ratio: 1;
        overflow: hidden;
        border-radius: 8px;
      }
      [data-composition-id="scene-4"] .picker-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: .6;
        display: block;
      }
      /* 第一张被选中：粉色描边 + 辉光 + 完全不透明 */
      [data-composition-id="scene-4"] .picker-item:first-child {
        box-shadow: 0 0 0 3px #EE5577, 0 0 24px rgba(238, 85, 119, .45);
        opacity: 1;
      }
      [data-composition-id="scene-4"] .picker-item:first-child img {
        opacity: 1;
      }

      /* 右栏：识别结果卡片 */
      [data-composition-id="scene-4"] .result-card {
        padding: 40px;
        border-radius: 20px;
        background: rgba(15, 15, 22, .92);
        border: 1px solid rgba(255, 255, 255, .08);
        backdrop-filter: blur(20px);
      }
      [data-composition-id="scene-4"] .result-label {
        font-size: 13px;
        letter-spacing: .2em;
        text-transform: uppercase;
        color: #EE5577;
        margin-bottom: 16px;
        font-weight: 500;
      }
      [data-composition-id="scene-4"] .result-title {
        font-size: 32px;
        font-weight: 600;
        color: #f6f4f8;
        margin-bottom: 24px;
        line-height: 1.25;
        font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      }
      [data-composition-id="scene-4"] .result-rows {
        display: flex;
        flex-direction: column;
      }
      [data-composition-id="scene-4"] .result-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, .08);
        font-size: 20px;
      }
      [data-composition-id="scene-4"] .result-row .row-key {
        color: rgba(246, 244, 248, .62);
        letter-spacing: .02em;
      }
      [data-composition-id="scene-4"] .result-row .row-val {
        color: #f6f4f8;
        font-variant-numeric: tabular-nums;
      }
      [data-composition-id="scene-4"] .color-swatch {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        background: #9977CC;
        display: inline-block;
        margin-right: 8px;
        vertical-align: middle;
      }
      [data-composition-id="scene-4"] .result-confidence {
        margin-top: 24px;
        font-size: 14px;
        color: rgba(246, 244, 248, .62);
        font-variant-numeric: tabular-nums;
      }
    </style>

    <!-- vision 辉光层（装饰性绝对定位，故意超出画布以扩散辉光） -->
    <div class="vision-glow" data-layout-allow-overflow></div>

    <!-- 内容主体（flex + padding 布局） -->
    <div class="scene-content">
      <header class="scene-header">
        <div class="eyebrow">VISION · MULTIMODAL</div>
        <h2 class="section-title">看一眼，就懂了</h2>
      </header>

      <div class="vision-grid">
        <!-- 左栏：3×3 图片选择器，首张选中（藤都子） -->
        <div class="picker">
          <div class="picker-grid">
            <div class="picker-item">
              <img crossorigin="anonymous" src="assets/characters/img_full_fuji-miyako_01.webp" alt="" />
            </div>
            <div class="picker-item">
              <img crossorigin="anonymous" src="assets/characters/img_full_sengoku-yuno_01.webp" alt="" />
            </div>
            <div class="picker-item">
              <img crossorigin="anonymous" src="assets/characters/img_full_minetsuki-ritsu_01.webp" alt="" />
            </div>
            <div class="picker-item">
              <img crossorigin="anonymous" src="assets/characters/img_full_nakamachi-arale_01.webp" alt="" />
            </div>
            <div class="picker-item">
              <img crossorigin="anonymous" src="assets/characters/img_full_miyanaga-nonoka_01.webp" alt="" />
            </div>
            <div class="picker-item">
              <img crossorigin="anonymous" src="assets/characters/img_character-main-viola.webp" alt="" />
            </div>
            <div class="picker-item">
              <img crossorigin="anonymous" src="assets/characters/img_full_fuji-miyako_01.webp" alt="" />
            </div>
            <div class="picker-item">
              <img crossorigin="anonymous" src="assets/characters/img_full_sengoku-yuno_01.webp" alt="" />
            </div>
            <div class="picker-item">
              <img crossorigin="anonymous" src="assets/characters/img_full_minetsuki-ritsu_01.webp" alt="" />
            </div>
          </div>
        </div>

        <!-- 右栏：识别结果卡片 -->
        <div class="result-card">
          <div class="result-label">VISION RESULT</div>
          <div class="result-title">检测到：藤都子立绘</div>
          <div class="result-rows">
            <div class="result-row">
              <span class="row-key">角色名</span>
              <span class="row-val">藤都子</span>
            </div>
            <div class="result-row">
              <span class="row-key">定位</span>
              <span class="row-val">键盘手（KEYBOARD）</span>
            </div>
            <div class="result-row">
              <span class="row-key">主题色</span>
              <span class="row-val"><span class="color-swatch"></span>#9977CC</span>
            </div>
          </div>
          <div class="result-confidence">置信度 98.6%</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // ===== 场景 4 时间线：多模态识图（仅入场，无 exit） =====
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 1. 眉头入场
      tl.from(".eyebrow", { y: 12, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.2);

      // 2. 标题入场
      tl.from(".section-title", { y: 24, opacity: 0, duration: 0.6, ease: "expo.out" }, 0.35);

      // 3. 左栏选择器滑入
      tl.from(".picker", { x: -40, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.5);

      // 4. 缩略图 stagger 入场
      tl.from(".picker-item", { scale: 0.8, opacity: 0, duration: 0.3, ease: "power2.out", stagger: 0.04 }, 0.7);

      // 5. 选中高亮：从无辉光到完整粉色描边辉光
      tl.from(".picker-item:first-child", { boxShadow: "0 0 0 0px #EE5577, 0 0 0px rgba(238,85,119,0)", duration: 0.4, ease: "power2.out" }, 1.2);

      // 6. 右栏结果卡片滑入
      tl.from(".result-card", { x: 40, opacity: 0, duration: 0.6, ease: "power3.out" }, 1.5);

      // 7. vision 辉光激活：先放大爆开，再回落到稳定亮度
      tl.fromTo(".vision-glow",
        { opacity: 0, scale: 0.5 },
        { opacity: 1, scale: 1.5, duration: 0.6, ease: "expo.out", transformOrigin: "50% 50%" },
        2.0
      );
      tl.to(".vision-glow", { opacity: 0.3, duration: 0.4, ease: "power2.out" }, 2.6);

      // 8. 结果行 stagger 入场
      tl.from(".result-row", { y: 20, opacity: 0, duration: 0.4, ease: "power2.out", stagger: 0.15 }, 2.8);

      // 9. 置信度入场
      tl.from(".result-confidence", { y: 15, opacity: 0, duration: 0.4, ease: "back.out(1.4)" }, 3.6);

      window.__timelines["scene-4"] = tl;
    </script>
  </div>
</template>
