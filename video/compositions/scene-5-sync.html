<template id="scene-5-template">
  <div data-composition-id="scene-5" data-width="1920" data-height="1080">
    <style>
      @font-face { font-family: 'PingFang SC'; src: local('PingFang SC'), local('PingFangSC-Regular'); }
      @font-face { font-family: 'Hiragino Sans GB'; src: local('Hiragino Sans GB'), local('HiraginoSansGB-W3'); }
      @font-face { font-family: 'Microsoft YaHei'; src: local('Microsoft YaHei'), local('MicrosoftYaHei'); }
      /* ===== 场景 5：同步与更新 — 局部样式 ===== */
      [data-composition-id="scene-5"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #08080c;
        font-family: "Inter", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
        overflow: hidden;
      }

      /* 内容容器：flex + padding 布局（非绝对定位） */
      [data-composition-id="scene-5"] .scene-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 48px 120px;
        gap: 24px;
        box-sizing: border-box;
        position: relative;
        z-index: 10;
      }

      /* 章节眉头：顶部居中 */
      [data-composition-id="scene-5"] .scene-header {
        text-align: center;
      }
      [data-composition-id="scene-5"] .eyebrow {
        font-size: 14px;
        letter-spacing: .22em;
        text-transform: uppercase;
        color: #EE5577;
        font-weight: 500;
      }

      /* ===== 上段：引继码同步 ===== */
      [data-composition-id="scene-5"] .sync-section {
        transform-origin: 50% 50%;
      }

      /* 手机并排容器（position:relative 供 token / 对勾绝对定位） */
      [data-composition-id="scene-5"] .phones-row {
        position: relative;
        display: flex;
        gap: 120px;
        justify-content: center;
        width: 840px;
        margin: 0 auto;
      }

      /* 手机框 */
      [data-composition-id="scene-5"] .phone {
        width: 360px;
        height: 640px;
        border-radius: 32px;
        background: #0f0f16;
        border: 1px solid rgba(255, 255, 255, .08);
        overflow: hidden;
        position: relative;
      }

      /* 手机顶栏 */
      [data-composition-id="scene-5"] .phone-bar {
        height: 60px;
        background: rgba(238, 85, 119, .08);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #f6f4f8;
        letter-spacing: .04em;
      }

      /* 手机内容区 */
      [data-composition-id="scene-5"] .phone-body {
        padding: 20px 0;
      }

      /* 对话占位横线 */
      [data-composition-id="scene-5"] .line-placeholder {
        height: 12px;
        background: rgba(255, 255, 255, .08);
        border-radius: 6px;
        margin: 12px 20px;
      }

      /* 引继码 token：初始在设备 A 上方（右侧偏移以使 x:240 后落在设备 B） */
      [data-composition-id="scene-5"] .handoff-token {
        position: absolute;
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #EE5577;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: #fff;
        box-shadow: 0 0 24px rgba(238, 85, 119, .45);
        z-index: 10;
        left: 240px;
        top: -40px;
      }

      /* 同步完成对勾：绝对定位居中 */
      [data-composition-id="scene-5"] .sync-check {
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #EE5577;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        left: 50%;
        top: 50%;
        margin-left: -40px;
        margin-top: -40px;
        box-shadow: 0 0 32px rgba(238, 85, 119, .45);
        z-index: 20;
      }

      /* ===== 下段：APK 下载与主题切换 ===== */
      [data-composition-id="scene-5"] .update-section {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 下载进度条 */
      [data-composition-id="scene-5"] .download-bar {
        width: 600px;
        height: 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, .08);
        overflow: hidden;
        margin: 0 auto;
      }
      [data-composition-id="scene-5"] .download-fill {
        height: 100%;
        width: 0%;
        background: #EE5577;
        border-radius: 4px;
        box-shadow: 0 0 12px rgba(238, 85, 119, .45);
      }

      /* 下载标签 */
      [data-composition-id="scene-5"] .download-label {
        text-align: center;
        font-size: 18px;
        color: #f6f4f8;
        margin-top: 20px;
      }

      /* 下载百分比（::after 输出 % 符号，textContent 仅含数字便于 GSAP 递增） */
      [data-composition-id="scene-5"] .download-percent {
        text-align: center;
        font-size: 48px;
        font-weight: 800;
        color: #EE5577;
        margin-top: 16px;
        font-variant-numeric: tabular-nums;
      }
      [data-composition-id="scene-5"] .download-percent::after {
        content: "%";
      }

      /* 主题色切换演示色块 */
      [data-composition-id="scene-5"] .theme-swatch {
        width: 200px;
        height: 80px;
        border-radius: 16px;
        margin: 40px auto 0;
        background: #EE5577;
        box-shadow: 0 0 32px rgba(238, 85, 119, .45);
        transition: none;
      }
    </style>

    <!-- 内容主体（flex + padding 布局） -->
    <div class="scene-content">
      <header class="scene-header">
        <div class="eyebrow">SYNC · UPDATE</div>
      </header>

      <!-- 上段：引继码同步 -->
      <div class="sync-section">
        <div class="phones-row">
          <!-- 设备 A -->
          <div class="phone phone-a">
            <div class="phone-bar">设备 A</div>
            <div class="phone-body">
              <div class="line-placeholder"></div>
              <div class="line-placeholder" style="width:70%"></div>
              <div class="line-placeholder" style="width:85%"></div>
              <div class="line-placeholder" style="width:60%"></div>
              <div class="line-placeholder" style="width:75%"></div>
              <div class="line-placeholder" style="width:65%"></div>
              <div class="line-placeholder" style="width:80%"></div>
            </div>
          </div>

          <!-- 设备 B -->
          <div class="phone phone-b">
            <div class="phone-bar">设备 B</div>
            <div class="phone-body">
              <div class="line-placeholder"></div>
              <div class="line-placeholder" style="width:70%"></div>
              <div class="line-placeholder" style="width:85%"></div>
              <div class="line-placeholder" style="width:60%"></div>
              <div class="line-placeholder" style="width:75%"></div>
              <div class="line-placeholder" style="width:65%"></div>
              <div class="line-placeholder" style="width:80%"></div>
            </div>
          </div>

          <!-- 引继码 token：初始在设备 A 上方，弧线飞至设备 B -->
          <div class="handoff-token">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
              <path d="M4 12a8 8 0 0 1 13.66-5.66L20 8M20 8V3M20 8h-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20 12a8 8 0 0 1-13.66 5.66L4 16M4 16v5M4 16h5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- 同步完成对勾 -->
          <div class="sync-check">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <path d="M10 20 L17 27 L30 13" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- 下段：APK 下载与主题切换 -->
      <div class="update-section">
        <div class="download-bar">
          <div class="download-fill"></div>
        </div>
        <div class="download-label">正在下载更新…</div>
        <div class="download-percent">0</div>
        <div class="theme-swatch"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // ===== 场景 5 时间线：同步与更新（入场 + 状态变化，无 exit） =====
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 1. 眉头入场
      tl.from(".eyebrow", { y: 12, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.2);

      // 2. 两个手机框 stagger 入场
      tl.from(".phone-a, .phone-b", { y: 30, opacity: 0, duration: 0.5, ease: "expo.out", stagger: 0.15 }, 0.4);

      // 3. 引继码 token 出现
      tl.from(".handoff-token", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.6)" }, 1.0);

      // 4. token 飞行（弧线：先上后下，水平偏移 240px 从设备 A 到设备 B）
      tl.to(".handoff-token", {
        keyframes: [
          { x: 240, y: -40, duration: 0.8 },
          { x: 240, y: 0, duration: 0.4 }
        ],
        ease: "power2.inOut"
      }, 1.5);

      // 5. 同步对勾弹出（先 set scale:0，再弹到 scale:1）
      tl.set(".sync-check", { scale: 0, transformOrigin: "50% 50%" }, 2.7);
      tl.to(".sync-check", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" }, 2.7);

      // 6. 上段淡出（状态变化，保留 0.15 可见度，非 exit）
      tl.to(".sync-section", { opacity: 0.15, scale: 0.92, duration: 0.5, ease: "power2.inOut" }, 3.2);

      // 7. 下段入场
      tl.from(".update-section", { y: 30, opacity: 0, duration: 0.5, ease: "expo.out" }, 3.5);

      // 8. 下载进度条填充
      tl.to(".download-fill", { width: "100%", duration: 2, ease: "power1.inOut" }, 4.0);

      // 9. 百分比数字递增（snap 整数，::after 输出 % 符号）
      tl.to(".download-percent", { textContent: 100, duration: 2, ease: "power1.inOut", snap: { textContent: 1 } }, 4.0);

      // 10. 下载完成标签变化
      tl.to(".download-label", {
        duration: 0.3,
        onStart: function() {
          this.targets()[0].textContent = "下载完成，正在安装…";
        }
      }, 6.0);

      // 11. 主题色切换：由乃粉 → 都子紫
      tl.to(".theme-swatch", { backgroundColor: "#9977CC", boxShadow: "0 0 32px rgba(153,119,204,.45)", duration: 0.4, ease: "power2.inOut" }, 6.5);

      window.__timelines["scene-5"] = tl;
    </script>
  </div>
</template>
