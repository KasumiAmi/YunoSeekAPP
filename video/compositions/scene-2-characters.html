<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- GSAP CDN -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
  <template id="scene-2-template">
    <div data-composition-id="scene-2" data-width="1920" data-height="1080">
      <!-- 内容容器：flex + padding 布局，非绝对定位 -->
      <div class="scene-content">
        <!-- 章节眉头：顶部居中 -->
        <div class="cast-header">
          <div class="eyebrow">MEET MEWTYPE</div>
          <h2 class="section-title">梦想，无限大</h2>
        </div>

        <!-- 6 角色群像网格：3列×2行 -->
        <div class="cast-grid">
          <article class="cast-card" data-color="#9977CC">
            <img src="assets/characters/img_full_fuji-miyako_01.webp" crossorigin="anonymous" alt="藤都子" />
            <div class="cast-meta">
              <div class="cast-role">KEYBOARD</div>
              <h3 class="cast-name">藤都子</h3>
            </div>
          </article>

          <article class="cast-card" data-color="#EE5577">
            <img src="assets/characters/img_full_sengoku-yuno_01.webp" crossorigin="anonymous" alt="千石由乃" />
            <div class="cast-meta">
              <div class="cast-role">DJ / MANIPULATOR</div>
              <h3 class="cast-name">千石由乃</h3>
            </div>
          </article>

          <article class="cast-card" data-color="#4477CC">
            <img src="assets/characters/img_full_minetsuki-ritsu_01.webp" crossorigin="anonymous" alt="峰月律" />
            <div class="cast-meta">
              <div class="cast-role">RHYTHM GUITAR</div>
              <h3 class="cast-name">峰月律</h3>
            </div>
          </article>

          <article class="cast-card" data-color="#FFEE55">
            <img src="assets/characters/img_full_nakamachi-arale_01.webp" crossorigin="anonymous" alt="仲町阿拉蕾" />
            <div class="cast-meta">
              <div class="cast-role">VOCAL · LEADER</div>
              <h3 class="cast-name">仲町阿拉蕾</h3>
            </div>
          </article>

          <article class="cast-card" data-color="#FFBBCC">
            <img src="assets/characters/img_full_miyanaga-nonoka_01.webp" crossorigin="anonymous" alt="宫永野乃花" />
            <div class="cast-meta">
              <div class="cast-role">LEAD GUITAR</div>
              <h3 class="cast-name">宫永野乃花</h3>
            </div>
          </article>

          <article class="cast-card" data-color="#B084CC">
            <img src="assets/characters/img_character-main-viola.webp" crossorigin="anonymous" alt="薇欧拉" />
            <div class="cast-meta">
              <div class="cast-role">PUA · CPU</div>
              <h3 class="cast-name">薇欧拉</h3>
            </div>
          </article>
        </div>
      </div>

      <style>
        @font-face { font-family: 'PingFang SC'; src: local('PingFang SC'), local('PingFangSC-Regular'); }
        @font-face { font-family: 'Hiragino Sans GB'; src: local('Hiragino Sans GB'), local('HiraginoSansGB-W3'); }
        @font-face { font-family: 'Microsoft YaHei'; src: local('Microsoft YaHei'), local('MicrosoftYaHei'); }
        /* 场景样式，scoped 到 [data-composition-id="scene-2"] */
        [data-composition-id="scene-2"] {
          position: relative;
          width: 1920px;
          height: 1080px;
          background: #08080c;
          overflow: hidden;
          font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
        }

        /* 内容容器：flex + padding 布局，非绝对定位 */
        [data-composition-id="scene-2"] .scene-content {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          width: 100%;
          height: 100%;
          padding: 32px 460px;
          gap: 20px;
          box-sizing: border-box;
        }

        /* 章节眉头 */
        [data-composition-id="scene-2"] .cast-header {
          text-align: center;
          width: 100%;
        }

        [data-composition-id="scene-2"] .eyebrow {
          font-size: 14px;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: #EE5577;
          line-height: 1.2;
        }

        [data-composition-id="scene-2"] .section-title {
          font-size: 64px;
          font-weight: 600;
          color: #f6f4f8;
          letter-spacing: -0.025em;
          line-height: 1.1;
          margin-top: 8px;
          margin-bottom: 0;
        }

        /* 角色卡片网格：3列×2行 */
        [data-composition-id="scene-2"] .cast-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 2px;
          max-width: 1200px;
          width: 100%;
          margin: 0 auto;
        }

        /* 单张角色卡片 */
        [data-composition-id="scene-2"] .cast-card {
          aspect-ratio: 3 / 4;
          overflow: hidden;
          position: relative;
          border: 2px solid transparent;
          box-shadow: none;
        }

        /* 立绘图片 */
        [data-composition-id="scene-2"] .cast-card img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          opacity: 0.7;
          filter: saturate(1);
        }

        /* 底部渐变遮罩 */
        [data-composition-id="scene-2"] .cast-card::after {
          content: "";
          background: linear-gradient(180deg, rgba(8, 8, 12, 0) 40%, rgba(8, 8, 12, 0.92) 100%);
          position: absolute;
          inset: 0;
          pointer-events: none;
        }

        /* 卡片底部角色信息（绝对定位装饰） */
        [data-composition-id="scene-2"] .cast-meta {
          position: absolute;
          left: 24px;
          right: 24px;
          bottom: 24px;
          z-index: 2;
        }

        /* 角色定位标签：统一用主强调色 */
        [data-composition-id="scene-2"] .cast-role {
          font-size: 13px;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #EE5577;
          margin-bottom: 6px;
        }

        /* 角色名 */
        [data-composition-id="scene-2"] .cast-name {
          font-size: 28px;
          font-weight: 600;
          color: #f6f4f8;
          margin: 0;
        }
      </style>

      <script>
        // 注册子合成时间线
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. 眉头入场：上浮淡入
        tl.from(".eyebrow", {
          y: 12,
          opacity: 0,
          duration: 0.5,
          ease: "power2.out",
        }, 0.2);

        // 2. 标题入场：大幅上浮 + expo 缓动
        tl.from(".section-title", {
          y: 24,
          opacity: 0,
          duration: 0.64,
          ease: "expo.out",
        }, 0.35);

        // 3. 卡片 stagger 入场：上浮 + 微缩放
        tl.from(".cast-card", {
          y: 50,
          opacity: 0,
          scale: 0.95,
          duration: 0.5,
          ease: "expo.out",
          stagger: 0.1,
        }, 0.6);

        // 4. 角色名 stagger 入场：轻幅上浮
        tl.from(".cast-name", {
          y: 20,
          opacity: 0,
          duration: 0.4,
          ease: "power2.out",
          stagger: 0.08,
        }, 1.2);

        // 5. 主题色辉光轮换：依次点亮每张卡片的 box-shadow
        const colors = ["#9977CC", "#EE5577", "#4477CC", "#FFEE55", "#FFBBCC", "#B084CC"];
        colors.forEach((c, i) => {
          tl.to(`.cast-card:nth-child(${i + 1})`, {
            boxShadow: `0 0 0 2px ${c}, 0 0 32px ${c}66`,
            duration: 0.4,
            ease: "power2.out",
          }, 1.5 + i * 0.6);
        });

        // 6. 立绘提亮：透明度提升 + 轻微饱和度增强
        tl.to(".cast-card img", {
          opacity: 0.92,
          filter: "saturate(1.05)",
          duration: 0.6,
          ease: "power1.out",
        }, 1.5);

        window.__timelines["scene-2"] = tl;
      </script>
    </div>
  </template>
</body>
</html>
